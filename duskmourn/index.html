  <style>
    :root {
      --bg: #08101d;
      --text: #ecf2fb;
      --muted: #97aac6;
      --line: rgba(126, 157, 197, 0.18);
      --panel: rgba(13, 20, 34, 0.9);
      --accent: #5cc8ff;
      --gold: #f4c95d;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      color: var(--text);
      font: 15px/1.45 -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: radial-gradient(circle at top, #132849, var(--bg) 58%);
      min-height: 100vh;
    }
    .wrap { max-width: 1240px; margin: 0 auto; padding: 26px 20px 40px; }
    h1 { margin: 0 0 8px; font-size: 32px; }
    .muted { color: var(--muted); }
    .hero {
      display: grid;
      gap: 14px;
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 24px;
      padding: 22px;
      box-shadow: 0 18px 48px rgba(0,0,0,0.24);
    }
    .hero .stats { display: flex; gap: 10px; flex-wrap: wrap; }
    .pill {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      border-radius: 999px;
      border: 1px solid var(--line);
      padding: 6px 10px;
      color: var(--muted);
      background: rgba(255,255,255,0.04);
      font-size: 13px;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 16px;
      margin-top: 24px;
    }
    .card {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 22px;
      padding: 18px;
      display: grid;
      gap: 12px;
      box-shadow: 0 18px 48px rgba(0,0,0,0.22);
    }
    .card h2 { margin: 0; font-size: 20px; }
    .row { display: flex; justify-content: space-between; gap: 12px; }
    .chips { display: flex; gap: 6px; flex-wrap: wrap; }
    .chip {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 5px 9px;
      color: var(--muted);
      background: rgba(255,255,255,0.04);
      font-size: 12px;
    }
    .actions { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
    .link-btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      border-radius: 999px;
      padding: 9px 13px;
      background: rgba(92, 200, 255, 0.16);
      border: 1px solid rgba(92, 200, 255, 0.34);
      color: var(--text);
      text-decoration: none;
      font-weight: 600;
    }
    .link-btn.secondary {
      background: rgba(244, 201, 93, 0.14);
      border-color: rgba(244, 201, 93, 0.28);
    }
    .section-title { margin: 28px 0 10px; font-size: 13px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.08em; }
    .footer-links { margin-top: 18px; display: flex; gap: 10px; flex-wrap: wrap; }
  </style>
</head>

<script>
(function() {
  var payload = JSON.parse(document.getElementById('payloadData').textContent);
  var siteConfigHref = '../site-config.json';
  var hasGameData = !!(payload.meta && payload.meta.has_game_data);
  var performanceLabel = hasGameData ? 'Game WR' : 'Draft Match WR';
  var rowCountLabel = hasGameData ? 'Game rows' : 'Match rows';
  var rowUnitLabel = hasGameData ? 'Games' : 'Matches';
  function bootAnalytics(config) {
    var analytics = config || {};
    var gaId = String(analytics.ga4MeasurementId || '').trim();
    var clarityId = String(analytics.clarityProjectId || '').trim();
    if (gaId) {
      window.dataLayer = window.dataLayer || [];
      window.gtag = window.gtag || function() { window.dataLayer.push(arguments); };
      window.gtag('js', new Date());
      window.gtag('config', gaId, { page_title: document.title, page_path: window.location.pathname });
      var gaScript = document.createElement('script');
      gaScript.async = true;
      gaScript.src = 'https://www.googletagmanager.com/gtag/js?id=' + encodeURIComponent(gaId);
      document.head.appendChild(gaScript);
    }
    if (clarityId && !window.clarity) {
      (function(c,l,a,r,i,m,t,y){
        c[a]=c[a]||function(){(c[a].q=c[a].q||[]).push(arguments);};
        t=l.createElement(r); t.async=1; t.src='https://www.clarity.ms/tag/' + i;
        y=l.getElementsByTagName(r)[0]; y.parentNode.insertBefore(t,y);
      })(window, document, 'clarity', 'script', clarityId);
    }
    trackEvent('page_view_custom', { page_kind: 'format_landing', format_name: payload.meta.format || '', format_code: payload.meta.expansion || payload.meta.slug || '' });
  }
  function trackEvent(name, params) {
    var data = Object.assign({
      page_kind: 'format_landing',
      format_name: payload.meta.format || '',
      format_code: payload.meta.expansion || payload.meta.slug || ''
    }, params || {});
    if (window.gtag) window.gtag('event', name, data);
    if (window.clarity) {
      try { window.clarity('event', name); } catch (err) {}
    }
  }
  function pct(x) { return (100 * x).toFixed(2) + '%'; }
  var heroStats = document.getElementById('heroStats');
  [
    'Deck builds: ' + payload.meta.deck_count,
    rowCountLabel + ': ' + payload.meta.game_count,
    'Archetypes: ' + payload.meta.n_clusters,
    'Views: analysis + pick + build-around detector'
  ].forEach(function(text) {
    var span = document.createElement('span');
    span.className = 'pill';
    span.textContent = text;
    heroStats.appendChild(span);
  });
  var grid = document.getElementById('archetypeGrid');
  payload.overview.forEach(function(row) {
    var div = document.createElement('div');
    div.className = 'card';
    div.innerHTML = '' +
      '<div><h2>' + row.title + '</h2><div class="muted">' + row.color_name + '</div></div>' +
      '<div class="row"><span>' + performanceLabel + '</span><strong>' + pct(row.win_rate) + '</strong></div>' +
      '<div class="row"><span>Decks</span><strong>' + row.deck_count + '</strong></div>' +
      '<div class="row"><span>' + rowUnitLabel + '</span><strong>' + row.games + '</strong></div>' +
      '<div><div class="muted">What defines the deck</div><div class="chips">' + row.signposts.map(function(card) { return '<span class="chip">' + card + '</span>'; }).join('') + '</div></div>' +
      '<div><div class="muted">What wins drafts</div><div class="chips">' + row.pick_cards.map(function(card) { return '<span class="chip">' + card + '</span>'; }).join('') + '</div></div>' +
      '<div><div class="muted">Build-around candidates</div><div class="chips">' + row.build_arounds.map(function(card) { return '<span class="chip">' + card + '</span>'; }).join('') + '</div></div>' +
      '<div class="actions"><a class="link-btn" data-open-map href="' + row.href + '">Open Map</a><span class="link-btn secondary">Card spotlight inside</span></div>';
    grid.appendChild(div);
  });
  Array.prototype.slice.call(document.querySelectorAll('[data-open-map]')).forEach(function(link) {
    link.addEventListener('click', function() {
      trackEvent('archetype_open_from_format', { target_href: link.getAttribute('href') || '' });
    });
  });
  if (siteConfigHref && siteConfigHref !== '../site-config.json') {
    fetch(siteConfigHref)
      .then(function(resp) { return resp.ok ? resp.json() : null; })
      .then(function(config) { bootAnalytics(config && config.analytics ? config.analytics : {}); })
      .catch(function() { bootAnalytics({}); });
  } else {
    bootAnalytics({});
  }
})();
</script>
