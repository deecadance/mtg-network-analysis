    closeModal();
  });
  document.addEventListener('keydown', function(evt) {
    if (evt.key === 'Escape') {
      closeDrawer();
      closeModal();
      clearSelection();
    }
  });
  window.addEventListener('resize', syncFloatingLayout);
  loadAccessConfig();
  renderQuickChips();
  draw();
})();
</script>
</body>
</html>
