    .hover-card {

    var positiveScores = visibleNodes
      .map(function(node) { return Math.max(0.0, currentNodeScore(node)); })
      .filter(function(score) { return score > 0; })
      .sort(function(a, b) { return a - b; });
    var low = quantile(positiveScores, 0.15);
    var high = quantile(positiveScores, 0.95);
    var lowRoot = Math.sqrt(Math.max(0.0, low));
    var highRoot = Math.sqrt(Math.max(low, high));
    var spanRoot = Math.max(0.001, highRoot - lowRoot);
    visibleNodes.forEach(function(node) {
      var score = Math.max(0.0, currentNodeScore(node));
      var clipped = Math.min(Math.max(score, low), high);
      var normalized = positiveScores.length <= 1 ? 0.62 : (Math.sqrt(clipped) - lowRoot) / spanRoot;
      normalized = Math.max(0.0, Math.min(1.0, normalized));
      var minRadius = mode === 'analysis' ? 9.0 : 8.0;
      var maxRadius = mode === 'analysis' ? 26.0 : 30.0;
      radiusById[node.id] = minRadius + (maxRadius - minRadius) * Math.pow(normalized, 0.85);
    });
  }
  function currentNodeRadius(node) {
    return radiusById[node.id] || (mode === 'analysis' ? 9.0 : 8.0);
  }
  function currentNodeScore(node) {
    return mode === 'analysis' ? node.analysis_score : node.pick_priority_score;
  }
  function currentEdgeScore(edge) {
    return mode === 'analysis' ? edge.quality_score : edge.pick_score;
  }
  function shouldLabel(node) {
    if (!showLabels) return false;
    if (mode === 'analysis') return node.analysis_score >= 6.5 || node.dependency_score >= 0.09 || node.standalone_delta >= 0.028;
    return node.pick_priority_score >= 6.0 || node.rarity === 'rare' || node.rarity === 'mythic' || node.draft_drafts >= 220;
  }
  function positionHover(evt) {
    var x = evt.clientX + 22;
    var y = evt.clientY - 24;
    var maxX = window.innerWidth - 292;
    var maxY = window.innerHeight - 360;
    hoverCard.style.left = Math.max(12, Math.min(maxX, x)) + 'px';
    hoverCard.style.top = Math.max(12, Math.min(maxY, y)) + 'px';
  }
  function hideHover() {
    hoverCard.style.display = 'none';
  }
  function renderHover(node, evt) {
    positionHover(evt);
    hoverCard.style.display = 'block';
    var summary = mode === 'analysis'
      ? 'Standalone ' + pp(node.standalone_delta) + ' | Dependency ' + node.dependency_score.toFixed(3)
      : 'Draft lift ' + pp(node.draft_win_lift) + ' | Drafts ' + node.draft_drafts + ' | Pick score ' + node.pick_priority_score.toFixed(1) + ' / 10';
    hoverCard.innerHTML = '<div class="hover-body"><strong>' + node.id + '</strong><div class="muted">' + (node.color_identity || 'C') + ' | ' + node.rarity + ' | ' + roleText(node.role) + '</div><div style="margin-top:6px">' + summary + '</div><div class="muted" style="margin-top:4px">Loading image...</div></div>';
    if (imageCache[node.id]) {
      fillHoverImage(node, imageCache[node.id], summary);
      return;
    }
    var url = 'https://api.scryfall.com/cards/named?exact=' + encodeURIComponent(node.id);
    fetch(url)
      .then(function(resp) { return resp.json(); })
      .then(function(data) {
        imageCache[node.id] = data;
        fillHoverImage(node, data, summary);
      })
      .catch(function() {
        hoverCard.innerHTML = '<div class="hover-body"><strong>' + node.id + '</strong><div class="muted">Image unavailable</div><div style="margin-top:6px">' + summary + '</div></div>';
      });
  }
  function fillHoverImage(node, data, summary) {
    var imgUrl = null;
    if (data && data.image_uris && data.image_uris.normal) imgUrl = data.image_uris.normal;
    if (!imgUrl && data && data.card_faces && data.card_faces[0] && data.card_faces[0].image_uris) imgUrl = data.card_faces[0].image_uris.normal;
    var extra = '';
    if (data && data.prices && data.prices.usd) extra = '<div class="muted" style="margin-top:4px">Scryfall price: $' + data.prices.usd + '</div>';
    hoverCard.innerHTML = (imgUrl ? '<img src="' + imgUrl + '" alt="' + node.id + '" />' : '') +
      '<div class="hover-body"><strong>' + node.id + '</strong><div class="muted">' + (node.color_identity || 'C') + ' | ' + node.rarity + ' | ' + roleText(node.role) + '</div><div style="margin-top:6px">' + summary + '</div>' + extra + '</div>';
  }
  function setSelection(html) {
    selectionBox.classList.remove('hidden');
    selectionBox.innerHTML = html;
  }
  function nodeDetail(node) {
    var body = mode === 'analysis'
      ? '<div>Analysis score: ' + node.analysis_score.toFixed(1) + ' / 10</div><div>Standalone lift: ' + pp(node.standalone_delta) + '</div><div>Dependency score: ' + node.dependency_score.toFixed(3) + '</div><div>Drawn-game WR: ' + pct(node.win_rate) + ' over ' + node.draw_games + ' games</div>'
      : '<div>Pick score: ' + node.pick_priority_score.toFixed(1) + ' / 10</div><div>Draft win lift: ' + pp(node.draft_win_lift) + '</div><div>Draft win rate: ' + pct(node.draft_win_rate) + '</div><div>Drafted in ' + node.draft_drafts + ' projected cluster drafts</div>';
    setSelection('<strong>' + node.id + '</strong><div class="muted">' + (node.color_identity || 'C') + ' | ' + node.rarity + ' | ' + roleText(node.role) + '</div><div style="margin-top:8px">' + body + '</div>');
  }
  function edgeDetail(edge) {
    var body = mode === 'analysis'
      ? '<div>Analysis score: ' + edge.quality_score.toFixed(2) + '</div><div>Pair WR: ' + pct(edge.pair_win_rate) + ' | Expected ' + pct(edge.pair_expected_win_rate) + '</div><div>Synergy logit delta: ' + edge.synergy_delta_logit.toFixed(3) + '</div>'
      : '<div>Pair pick score: ' + edge.pick_score.toFixed(1) + ' / 10</div><div>Draft pair events: ' + edge.draft_pair_events + '</div><div>Pair WR: ' + pct(edge.pair_win_rate) + ' across ' + edge.pair_games + ' games</div>';
    setSelection('<strong>' + edge.from + ' + ' + edge.to + '</strong><div class="muted">' + segment.title + '</div><div style="margin-top:8px">' + body + '</div>');
  }
  function isSignificantBooster(row, rarity) {
    if (!row || typeof row.draft_win_lift !== 'number') return false;
    if (row.draft_win_lift <= 0) return false;
    var raw = row.pick_priority_score_raw || 0;
    if (rarity === 'mythic') return row.draft_win_lift >= 0.010 || raw >= 120;
    if (rarity === 'rare') return row.draft_win_lift >= 0.006 || raw >= 120;
    if (rarity === 'uncommon') return row.draft_win_lift >= 0.0025 || raw >= 90;
    return row.draft_win_lift >= 0.0030 || raw >= 45;
  }
  function quickBoosterRows() {
    var rows = [];
    Object.keys(segment.pick_by_rarity || {}).forEach(function(rarity) {
      (segment.pick_by_rarity[rarity] || []).forEach(function(row) {
        rows.push({
          card: row.card,
          rarity: rarity,
          pick_priority_score: row.pick_priority_score,
          pick_priority_score_raw: row.pick_priority_score_raw || 0,
          draft_win_lift: row.draft_win_lift,
          draft_drafts: row.draft_drafts
        });
      });
    });
    if (quickRarity !== 'all') {
      rows = rows.filter(function(row) { return row.rarity === quickRarity; });
    }
    rows = rows.filter(function(row) { return isSignificantBooster(row, row.rarity); });
    rows.sort(function(a, b) {
      if (b.pick_priority_score_raw !== a.pick_priority_score_raw) return b.pick_priority_score_raw - a.pick_priority_score_raw;
      if (b.draft_win_lift !== a.draft_win_lift) return b.draft_win_lift - a.draft_win_lift;
      return b.draft_drafts - a.draft_drafts;
    });
    return rows.slice(0, quickRarity === 'all' ? 6 : 5);
  }
  function addQuickChip(label, meta, title, onClick) {
    var chip = document.createElement('button');
    chip.type = 'button';
    chip.className = 'chip chip-button is-clickable';
    var labelNode = document.createElement('span');
    labelNode.textContent = label;
    chip.appendChild(labelNode);
    if (meta) {
      var metaNode = document.createElement('small');
      metaNode.textContent = meta;
      chip.appendChild(metaNode);
    }
    if (title) chip.title = title;
    chip.addEventListener('click', onClick);
    quickChips.appendChild(chip);
  }
  function renderQuickChips() {
    quickChips.innerHTML = '';
    quickAnalysisBtn.classList.toggle('active', quickMode === 'analysis');
    quickBoostersBtn.classList.toggle('active', quickMode === 'boosters');
    quickRarityRow.classList.toggle('hidden', quickMode !== 'boosters');
    quickRarityButtons.forEach(function(button) {
      button.classList.toggle('active', button.getAttribute('data-rarity') === quickRarity);
    });
    if (quickMode === 'analysis') {
      quickHint.textContent = 'Cards that most cleanly define this archetype.';
      segment.signposts.slice(0, 5).forEach(function(row) {
        addQuickChip(
          row.card,
          row.lift.toFixed(2) + 'x',
          'Seen in ' + pct(row.cluster_prevalence) + ' of decks',
          function() {
            var node = findNodeById(row.card);
            if (node) nodeDetail(node);
          }
        );
      });
      return;
    }
    var rows = quickBoosterRows();
    if (quickRarity === 'all') {
      quickHint.textContent = 'Best win boosters overall. Commons and uncommons appear only when their lift is meaningful.';
    } else {
      quickHint.textContent = 'Significant ' + quickRarity + ' cards that materially raise wins in this archetype.';
    }
    if (!rows.length) {
      quickHint.textContent = 'No ' + (quickRarity === 'all' ? '' : quickRarity + ' ') + 'win boosters cleared the significance bar in this archetype.';
      return;
    }
    rows.forEach(function(row) {
      addQuickChip(
        row.card,
        '+' + pp(row.draft_win_lift),
        row.rarity + ' | Drafted in ' + row.draft_drafts + ' projected cluster drafts',
        function() {
          var node = findNodeById(row.card);
          if (node) nodeDetail(node);
        }
      );
    });
  }
  function renderLegend() {
    var shown = visibleNodes.length;
    var total = segment.nodes.length;
    var sizeText = mode === 'analysis'
      ? 'Node size = normalized analysis score on a 0-10 scale inside this archetype. Larger cards are more defining or more structurally important.'
      : 'Node size = normalized pick score on a 0-10 scale inside this archetype. Larger cards contribute more to projected wins when you draft this lane.';
    var edgeText = mode === 'analysis'
      ? 'Edge width/brightness = stronger positive pair synergy after adjusting for each card\'s own baseline.'
      : 'Edge width/brightness = stronger draft-backed pair that wins more than the archetype baseline.';
    var visibilityText = mode === 'analysis'
      ? 'Showing all supported cards in the archetype.'
      : 'Showing ' + shown + ' of ' + total + ' cards. Cards with non-positive projected win lift are hidden in pick-focused view.';
    var edgeClass = mode === 'analysis' ? 'legend-edge' : 'legend-edge pick';
    var nodeClass = mode === 'analysis' ? 'legend-node' : 'legend-node pick';
    legendBox.innerHTML =
      '<strong>View Legend</strong>' +
      '<div class="legend-grid">' +
        '<div class="legend-row"><div class="legend-samples"><span class="legend-area"></span></div><div>Shaded box = learned synergy knot. It groups cards that repeatedly cohere inside the archetype.</div></div>' +
        '<div class="legend-row"><div class="legend-samples"><span class="' + nodeClass + ' sm"></span><span class="' + nodeClass + ' md"></span><span class="' + nodeClass + ' lg"></span></div><div>' + sizeText + '</div></div>' +
        '<div class="legend-row"><div class="legend-samples"><span class="' + edgeClass + '"></span><span class="' + edgeClass + ' strong"></span></div><div>' + edgeText + '</div></div>' +
        '<div class="legend-row"><div class="legend-samples"><span class="legend-edge none"></span></div><div>No edge = the pair did not clear the support and positive-signal filters for this view.</div></div>' +
        '<div class="legend-row"><div class="legend-samples"><span class="' + nodeClass + ' md"></span></div><div>Isolated node = the card may be good alone, or there is not enough evidence for a reliable positive pair link.</div></div>' +
        '<div class="legend-row"><div class="legend-samples"></div><div>' + visibilityText + '</div></div>' +
      '</div>';
  }
  function renderDrawer() {
    var html = '';
    html += '<div class="drawer-card"><strong>' + segment.title + '</strong><div class="muted">' + segment.deck_count + ' decks | ' + segment.games + ' games | ' + pct(segment.win_rate) + ' game WR</div><div class="muted">Draft cluster WR: ' + pct(segment.draft_match_win_rate || 0) + ' | Color signature: ' + (segment.color_signature || 'C') + '</div></div>';
    html += '<h2>' + (mode === 'analysis' ? 'Analysis Signposts' : 'Priority Picks By Rarity') + '</h2>';
    if (mode === 'analysis') {
      html += '<div class="tableish">';
      segment.signposts.slice(0, 10).forEach(function(row) {
        html += '<div class="row"><div><strong>' + row.card + '</strong><div class="sub">lift ' + row.lift.toFixed(2) + 'x | ' + pct(row.cluster_prevalence) + ' of decks</div></div><div>' + row.z_score.toFixed(2) + '</div></div>';
      });
      html += '</div><h2>Best Pair Synergies</h2><div class="tableish">';
      segment.top_pairs.slice(0, 10).forEach(function(row) {
        html += '<div class="row"><div><strong>' + row.cards.join(' + ') + '</strong><div class="sub">WR ' + pct(row.pair_win_rate) + ' | ' + row.pair_games + ' games</div></div><div>' + row.quality_score.toFixed(2) + '</div></div>';
      });
      html += '</div><h2>Triplet Motifs</h2><div class="tableish">';
      (segment.triplets.length ? segment.triplets.slice(0, 10) : []).forEach(function(row) {
        html += '<div class="row"><div><strong>' + row.cards.join(' + ') + '</strong><div class="sub">WR ' + pct(row.win_rate) + ' | ' + row.games + ' games</div></div><div>' + row.quality.toFixed(2) + '</div></div>';
      });
      if (!segment.triplets.length) html += '<div class="muted">No triplets cleared the support threshold for this archetype.</div>';
      html += '</div>';
    } else {
      Object.keys(segment.pick_by_rarity).forEach(function(rarity) {
        var rarityRows = (segment.pick_by_rarity[rarity] || []).filter(function(row) {
          return row.draft_win_lift > 0 || row.pick_priority_score > 0;
        });
        if (!rarityRows.length) return;
        html += '<div class="rarity-title">' + rarity + '</div><div class="tableish">';
        rarityRows.forEach(function(row) {
          html += '<div class="row"><div><strong>' + row.card + '</strong><div class="sub">Draft lift ' + pp(row.draft_win_lift) + ' | Drafts ' + row.draft_drafts + '</div></div><div>' + row.pick_priority_score.toFixed(1) + ' / 10</div></div>';
        });
        html += '</div>';
      });
      html += '<h2>Draft-Supported Pairs</h2><div class="tableish">';
      segment.top_pick_pairs.slice(0, 10).forEach(function(row) {
        html += '<div class="row"><div><strong>' + row.cards.join(' + ') + '</strong><div class="sub">' + row.draft_pair_events + ' draft co-picks | ' + row.pair_games + ' games</div></div><div>' + row.pick_score.toFixed(1) + ' / 10</div></div>';
      });
      html += '</div>';
    }
    html += '<h2>Communities</h2><div class="tableish">';
    segment.communities.forEach(function(row) {
      html += '<div class="row"><div><strong>Knot ' + row.community_id + '</strong><div class="sub">' + row.top_cards.join(', ') + '</div></div><div>' + row.size + '</div></div>';
    });
    html += '</div>';
    drawer.innerHTML = html;
  }
  function drawNode(group, node) {
    var g = svgEl('g');
    var border = communityPalette[node.community % communityPalette.length];
    var fill = node.fill || { mode: 'solid', colors: ['rgb(148, 163, 184)'] };
    var r = currentNodeRadius(node);
    if (fill.mode === 'split' && fill.colors.length === 2) {
      g.appendChild(svgEl('path', { d: polarArc(node.x, node.y, r, -90, 90), fill: fill.colors[0] }));
      g.appendChild(svgEl('path', { d: polarArc(node.x, node.y, r, 90, 270), fill: fill.colors[1] }));
      g.appendChild(svgEl('circle', { cx: node.x, cy: node.y, r: r, fill: 'none', stroke: border, 'stroke-width': 2 }));
    } else {
      g.appendChild(svgEl('circle', { cx: node.x, cy: node.y, r: r, fill: fill.colors[0], stroke: border, 'stroke-width': 2 }));
    }
    if ((node.color_identity || '') === 'B') g.lastChild.setAttribute('stroke', '#f8fafc');
    g.style.cursor = 'pointer';
    g.addEventListener('mouseenter', function(evt) { renderHover(node, evt); });
    g.addEventListener('mousemove', function(evt) { positionHover(evt); });
    g.addEventListener('mouseleave', hideHover);
    g.addEventListener('click', function(evt) {
      evt.stopPropagation();
      nodeDetail(node);
    });
    group.appendChild(g);
  }
  function draw() {
    prepareViewState();
    clear(svg);
    renderQuickChips();
    renderLegend();
    if (drawer.classList.contains('open')) renderDrawer();
    var bg = svgEl('g');
    var edges = svgEl('g');
    var nodes = svgEl('g');
    var labels = svgEl('g');
    svg.appendChild(bg);
    svg.appendChild(edges);
    svg.appendChild(nodes);
    svg.appendChild(labels);
    segment.communities.forEach(function(community) {
      var members = visibleNodes.filter(function(node) { return node.community === community.community_id; });
      if (members.length < 2) return;
      var xs = members.map(function(node) { return node.x; });
      var ys = members.map(function(node) { return node.y; });
      var minX = Math.min.apply(null, xs) - 64;
      var maxX = Math.max.apply(null, xs) + 64;
      var minY = Math.min.apply(null, ys) - 64;
      var maxY = Math.max.apply(null, ys) + 64;
      bg.appendChild(svgEl('rect', { x: minX, y: minY, width: maxX - minX, height: maxY - minY, rx: 42, fill: communityPalette[community.community_id % communityPalette.length], opacity: 0.06 }));
    });
    var nodeMap = visibleNodeMap;
    var sortedEdges = segment.edges
      .filter(function(edge) { return nodeMap[edge.from] && nodeMap[edge.to] && currentEdgeScore(edge) > 0; })
      .sort(function(a, b) { return currentEdgeScore(b) - currentEdgeScore(a); })
      .slice(0, 72);
    var maxEdge = Math.max.apply(null, sortedEdges.map(function(edge) { return currentEdgeScore(edge); }).concat([0.01]));
    sortedEdges.forEach(function(edge) {
      var a = nodeMap[edge.from];
      var b = nodeMap[edge.to];
      if (!a || !b) return;
      var q = Math.pow(Math.max(0.0, currentEdgeScore(edge)) / maxEdge, 0.62);
      var width = 1.1 + 9.4 * q;
      var alpha = 0.16 + 0.76 * q;
      var stroke = mode === 'analysis'
        ? 'rgba(92, 200, 255, ' + alpha.toFixed(3) + ')'
        : 'rgba(244, 201, 93, ' + alpha.toFixed(3) + ')';
      var line = svgEl('line', { x1: a.x, y1: a.y, x2: b.x, y2: b.y, stroke: stroke, 'stroke-width': width.toFixed(2), 'stroke-linecap': 'round' });
      line.style.cursor = 'pointer';
      line.addEventListener('mouseenter', function() { edgeDetail(edge); });
      line.addEventListener('click', function(evt) {
        evt.stopPropagation();
        edgeDetail(edge);
      });
      edges.appendChild(line);
    });
    var sortedNodes = visibleNodes.slice().sort(function(a, b) { return currentNodeRadius(b) - currentNodeRadius(a); });
    sortedNodes.forEach(function(node) {
      drawNode(nodes, node);
      if (!shouldLabel(node)) return;
      var text = svgEl('text', { x: node.x + currentNodeRadius(node) + 4, y: node.y + 4, fill: '#edf2fb', 'font-size': 13 });
      text.textContent = node.label;
      labels.appendChild(text);
    });
  }
  analysisBtn.addEventListener('click', function() {
    mode = 'analysis';
    analysisBtn.classList.add('active');
    pickBtn.classList.remove('active');
    draw();
  });
  pickBtn.addEventListener('click', function() {
    mode = 'pick';
    pickBtn.classList.add('active');
    analysisBtn.classList.remove('active');
    draw();
  });
  labelsBtn.addEventListener('click', function() {
    showLabels = !showLabels;
    labelsBtn.classList.toggle('active', showLabels);
    labelsBtn.textContent = showLabels ? 'Labels On' : 'Labels Off';
    draw();
  });
  quickAnalysisBtn.addEventListener('click', function() {
    quickMode = 'analysis';
    renderQuickChips();
  });
  quickBoostersBtn.addEventListener('click', function() {
    quickMode = 'boosters';
    renderQuickChips();
  });
  quickRarityButtons.forEach(function(button) {
    button.addEventListener('click', function() {
      quickRarity = button.getAttribute('data-rarity') || 'all';
      renderQuickChips();
    });
  });
  drawerBtn.addEventListener('click', toggleDrawer);
  drawerOverlay.addEventListener('click', closeDrawer);
  svg.addEventListener('click', function() {
    selectionBox.classList.add('hidden');
  });
  renderQuickChips();
  draw();
})();
</script>
</body>
</html>
