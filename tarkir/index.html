<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>TDM Learned Archetype Synergy Map</title>
  <style>
    :root {
      --bg: #08101d;
      --text: #ecf2fb;
      --muted: #97aac6;
      --line: rgba(126, 157, 197, 0.18);
      --panel: rgba(13, 20, 34, 0.9);
      --accent: #5cc8ff;
      --gold: #f4c95d;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      color: var(--text);
      font: 15px/1.45 -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: radial-gradient(circle at top, #132849, var(--bg) 58%);
      min-height: 100vh;
    }
    .wrap { max-width: 1240px; margin: 0 auto; padding: 26px 20px 40px; }
    h1 { margin: 0 0 8px; font-size: 32px; }
    .muted { color: var(--muted); }
    .hero {
      display: grid;
      gap: 14px;
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 24px;
      padding: 22px;
      box-shadow: 0 18px 48px rgba(0,0,0,0.24);
    }
    .hero .stats { display: flex; gap: 10px; flex-wrap: wrap; }
    .pill {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      border-radius: 999px;
      border: 1px solid var(--line);
      padding: 6px 10px;
      color: var(--muted);
      background: rgba(255,255,255,0.04);
      font-size: 13px;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 16px;
      margin-top: 24px;
    }
    .card {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 22px;
      padding: 18px;
      display: grid;
      gap: 12px;
      box-shadow: 0 18px 48px rgba(0,0,0,0.22);
    }
    .card h2 { margin: 0; font-size: 20px; }
    .row { display: flex; justify-content: space-between; gap: 12px; }
    .chips { display: flex; gap: 6px; flex-wrap: wrap; }
    .chip {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 5px 9px;
      color: var(--muted);
      background: rgba(255,255,255,0.04);
      font-size: 12px;
    }
    .actions { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
    .link-btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      border-radius: 999px;
      padding: 9px 13px;
      background: rgba(92, 200, 255, 0.16);
      border: 1px solid rgba(92, 200, 255, 0.34);
      color: var(--text);
      text-decoration: none;
      font-weight: 600;
    }
    .link-btn.secondary {
      background: rgba(244, 201, 93, 0.14);
      border-color: rgba(244, 201, 93, 0.28);
    }
    .section-title { margin: 28px 0 10px; font-size: 13px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.08em; }
  </style>
</head>
<body>
<div class="wrap">
  <div class="hero">
    <div>
      <div class="section-title" style="margin:0 0 8px">Interactive Limited Map</div>
      <h1>Learn the archetypes and pick priorities fast.</h1>
      <div class="muted">Interactive archetype maps built from game and draft data. Use the analysis view to see what defines a deck. Use the pick-focused view to see which cards actually push wins.</div>
    </div>
    <div class="stats" id="heroStats"></div>
  </div>
  <div class="section-title">Archetypes</div>
  <div id="archetypeGrid" class="grid"></div>
</div>

<script>
(function() {
  var payload = JSON.parse(document.getElementById('payloadData').textContent);
  function pct(x) { return (100 * x).toFixed(2) + '%'; }
  var heroStats = document.getElementById('heroStats');
  [
    'Deck builds: ' + payload.meta.deck_count,
    'Game rows: ' + payload.meta.game_count,
    'Archetypes: ' + payload.meta.n_clusters,
    'Views: analysis + pick + build-around detector'
  ].forEach(function(text) {
    var span = document.createElement('span');
    span.className = 'pill';
    span.textContent = text;
    heroStats.appendChild(span);
  });
  var grid = document.getElementById('archetypeGrid');
  payload.overview.forEach(function(row) {
    var div = document.createElement('div');
    div.className = 'card';
    div.innerHTML = '' +
      '<div><h2>' + row.title + '</h2><div class="muted">' + row.color_name + '</div></div>' +
      '<div class="row"><span>Game WR</span><strong>' + pct(row.win_rate) + '</strong></div>' +
      '<div class="row"><span>Decks</span><strong>' + row.deck_count + '</strong></div>' +
      '<div class="row"><span>Games</span><strong>' + row.games + '</strong></div>' +
      '<div><div class="muted">What defines the deck</div><div class="chips">' + row.signposts.map(function(card) { return '<span class="chip">' + card + '</span>'; }).join('') + '</div></div>' +
      '<div><div class="muted">What wins drafts</div><div class="chips">' + row.pick_cards.map(function(card) { return '<span class="chip">' + card + '</span>'; }).join('') + '</div></div>' +
      '<div><div class="muted">Build-around candidates</div><div class="chips">' + row.build_arounds.map(function(card) { return '<span class="chip">' + card + '</span>'; }).join('') + '</div></div>' +
      '<div class="actions"><a class="link-btn" href="' + row.href + '">Open Map</a><span class="link-btn secondary">Card spotlight inside</span></div>';
    grid.appendChild(div);
  });
})();
</script>
