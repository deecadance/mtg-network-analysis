      var xs = members.map(function(node) { return node.x; });
      var ys = members.map(function(node) { return node.y; });
      var minX = Math.min.apply(null, xs) - 64;
      var maxX = Math.max.apply(null, xs) + 64;
      var minY = Math.min.apply(null, ys) - 64;
      var maxY = Math.max.apply(null, ys) + 64;
      var knotOpacity = (0.03 + 0.12 * communityConfidence(community)).toFixed(3);
      var knotRect = svgEl('rect', { x: minX, y: minY, width: maxX - minX, height: maxY - minY, rx: 42, fill: communityPalette[community.community_id % communityPalette.length], opacity: knotOpacity });
      knotRect.style.cursor = 'pointer';
      bindInteractiveTarget(knotRect, function() {
        communityDetail(community);
      });
      bg.appendChild(knotRect);
    });
    var nodeMap = visibleNodeMap;
    var sortedEdges = visibleEdges;
    var maxEdge = Math.max.apply(null, sortedEdges.map(function(edge) { return currentEdgeScore(edge); }).concat([0.01]));
    sortedEdges.forEach(function(edge) {
      var direction = edgeDirection(edge);
      if (!direction) return;
      var signal = Math.pow(Math.max(0.0, currentEdgeScore(edge)) / maxEdge, 0.62);
      var confidence = edgeConfidence(edge);
      var width = 1.0 + 2.4 * confidence + 4.8 * signal;
      var alpha = 0.12 + 0.76 * confidence;
      var stroke = mode === 'analysis'
        ? 'rgba(92, 200, 255, ' + alpha.toFixed(3) + ')'
        : 'rgba(244, 201, 93, ' + alpha.toFixed(3) + ')';
      var geometry = edgeGeometry(direction, width);
      var edgeGroup = svgEl('g');
      var line = svgEl('line', {
        x1: geometry.x1,
        y1: geometry.y1,
        x2: geometry.x2,
        y2: geometry.y2,
        stroke: stroke,
        'stroke-width': width.toFixed(2),
        'stroke-linecap': 'round'
      });
      var arrow = svgEl('polygon', {
        points: geometry.tipX + ',' + geometry.tipY + ' ' + geometry.leftX + ',' + geometry.leftY + ' ' + geometry.rightX + ',' + geometry.rightY,
        fill: stroke,
        stroke: 'none'
      });
      var hitLine = svgEl('line', {
        x1: geometry.x1,
        y1: geometry.y1,
        x2: geometry.tipX,
        y2: geometry.tipY,
        stroke: 'transparent',
        'stroke-width': Math.max(10, width + 8).toFixed(2),
        'stroke-linecap': 'round'
      });
      edgeGroup.setAttribute('class', 'edge-hit');
      edgeGroup.style.cursor = 'pointer';
      edgeGroup.appendChild(line);
      edgeGroup.appendChild(arrow);
      edgeGroup.appendChild(hitLine);
      bindInteractiveTarget(edgeGroup, function() {
        edgeDetail(edge);
      });
      edges.appendChild(edgeGroup);
    });
    var sortedNodes = visibleNodes.slice().sort(function(a, b) { return currentNodeRadius(b) - currentNodeRadius(a); });
    sortedNodes.forEach(function(node) {
      drawNode(nodes, node);
      if (!shouldLabel(node)) return;
      var text = svgEl('text', { x: node.x + currentNodeRadius(node) + 4, y: node.y + 4, fill: '#edf2fb', 'font-size': 13, 'pointer-events': 'none' });
      text.textContent = node.label;
      labels.appendChild(text);
    });
    syncFloatingLayout();
  }
  analysisBtn.addEventListener('click', function() {
    mode = 'analysis';
    analysisBtn.classList.add('active');
    pickBtn.classList.remove('active');
    trackEvent('view_mode_selected', { view_mode: 'analysis' });
    draw();
  });
  pickBtn.addEventListener('click', function() {
    mode = 'pick';
    pickBtn.classList.add('active');
    analysisBtn.classList.remove('active');
    trackEvent('view_mode_selected', { view_mode: 'pick' });
    draw();
  });
  buildAroundBtn.addEventListener('click', function() {
    if (access.premiumFilters.buildArounds) {
      premiumMessage('Build-around filtering');
      return;
    }
    filters.buildArounds = !filters.buildArounds;
    buildAroundBtn.classList.toggle('active', filters.buildArounds);
    draw();
  });
  topSynergyBtn.addEventListener('click', function() {
    if (access.premiumFilters.topSynergies) {
      premiumMessage('Top synergies filtering');
      return;
    }
    filters.topSynergies = !filters.topSynergies;
    topSynergyBtn.classList.toggle('active', filters.topSynergies);
    draw();
  });
  coreBtn.addEventListener('click', function() {
    if (access.premiumFilters.coreOnly) {
      premiumMessage('Core-only filtering');
      return;
    }
    filters.coreOnly = !filters.coreOnly;
    coreBtn.classList.toggle('active', filters.coreOnly);
    draw();
  });
  labelsBtn.addEventListener('click', function() {
    showLabels = !showLabels;
    labelsBtn.classList.toggle('active', showLabels);
    labelsBtn.textContent = showLabels ? 'Labels On' : 'Labels Off';
    draw();
  });
  quickAnalysisBtn.addEventListener('click', function() {
    quickMode = 'analysis';
    trackEvent('quick_mode_selected', { quick_mode: 'analysis', view_mode: mode });
    renderQuickChips();
  });
  quickBoostersBtn.addEventListener('click', function() {
    quickMode = 'boosters';
    trackEvent('quick_mode_selected', { quick_mode: 'boosters', view_mode: mode });
    renderQuickChips();
  });
  quickBuildBtn.addEventListener('click', function() {
    if (access.premiumQuickRead.buildArounds) {
      premiumMessage('Quick Read build-around detector');
      return;
    }
    quickMode = 'builds';
    trackEvent('quick_mode_selected', { quick_mode: 'builds', view_mode: mode });
    renderQuickChips();
  });
  quickRarityButtons.forEach(function(button) {
    button.addEventListener('click', function() {
      quickRarity = button.getAttribute('data-rarity') || 'all';
      renderQuickChips();
    });
  });
  zoomOutBtn.addEventListener('click', function() { zoomAt(1 / 1.18); });
  resetViewBtn.addEventListener('click', resetViewport);
  zoomInBtn.addEventListener('click', function() { zoomAt(1.18); });
  quickToggleBtn.addEventListener('click', toggleQuickRead);
  legendToggleBtn.addEventListener('click', toggleLegend);
  drawerBtn.addEventListener('click', toggleDrawer);
  drawerOverlay.addEventListener('click', closeDrawer);
  svg.addEventListener('wheel', function(evt) {
    evt.preventDefault();
    zoomAt(evt.deltaY < 0 ? 1.14 : (1 / 1.14), evt.clientX, evt.clientY);
  }, { passive: false });
  svg.addEventListener('pointerdown', function(evt) {
    if (evt.button !== undefined && evt.button !== 0) return;
    if (blocksPan(evt.target)) return;
    dragState = {
      pointerId: evt.pointerId,
      startPoint: svgPointFromClient(evt.clientX, evt.clientY),
      startTx: viewState.tx,
      startTy: viewState.ty,
      moved: false
    };
    suppressClickUntil = 0;
    if (svg.setPointerCapture) svg.setPointerCapture(evt.pointerId);
  });
  svg.addEventListener('pointermove', function(evt) {
    if (!dragState || dragState.pointerId !== evt.pointerId) return;
    var point = svgPointFromClient(evt.clientX, evt.clientY);
    var dx = point.x - dragState.startPoint.x;
    var dy = point.y - dragState.startPoint.y;
    if (!dragState.moved && (Math.abs(dx) > 4 || Math.abs(dy) > 4)) {
      dragState.moved = true;
      svg.classList.add('is-dragging');
    }
    if (!dragState.moved) return;
    viewState.tx = dragState.startTx + dx;
    viewState.ty = dragState.startTy + dy;
    applyViewportTransform();
    suppressClickUntil = Date.now() + 120;
    evt.preventDefault();
  });
  function endPan(evt) {
    if (!dragState) return;
    if (evt && dragState.pointerId !== evt.pointerId) return;
    if (evt && svg.releasePointerCapture) {
      try { svg.releasePointerCapture(evt.pointerId); } catch (err) {}
    }
    dragState = null;
    svg.classList.remove('is-dragging');
  }
  svg.addEventListener('pointerup', endPan);
  svg.addEventListener('pointercancel', endPan);
  svg.addEventListener('click', function() {
    if (shouldSuppressClick()) return;
    clearSelection();
    closeModal();
  });
  document.addEventListener('keydown', function(evt) {
    if (evt.key === 'Escape') {
      closeDrawer();
      closeModal();
      clearSelection();
    }
  });
  window.addEventListener('resize', syncFloatingLayout);
  loadAccessConfig();
  renderQuickChips();
  draw();
})();
</script>
</body>
</html>
