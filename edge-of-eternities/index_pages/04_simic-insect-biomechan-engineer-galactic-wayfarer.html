      pointer-events: none;

      border-radius: 16px;
      padding: 10px 12px;

      bottom: 16px;
      z-index: 8;
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 10px 12px;
      max-width: min(360px, calc(100vw - 32px));
      box-shadow: 0 14px 40px rgba(0,0,0,0.28);

    .chip-row {

      gap: 6px;
      flex-wrap: wrap;
      margin-bottom: 8px;
    }
    .mini-nav .chips { display: flex; gap: 6px; flex-wrap: wrap; }

      align-items: center;
      gap: 6px;

      border-radius: 999px;
      padding: 4px 8px;
      color: var(--muted);
      font-size: 12px;
      background: rgba(255,255,255,0.04);
    }
    .chip small {
      color: var(--muted);
      font-size: 11px;
    }
    .chip-button {
      padding: 4px 8px;
      font-size: 12px;
      background: rgba(255,255,255,0.04);
      color: var(--muted);
    }
    .chip-button.active {
      background: rgba(92, 200, 255, 0.18);
      border-color: rgba(92, 200, 255, 0.45);
      color: var(--text);
    }
    .chip-button.is-clickable { cursor: pointer; }
    .quick-note {

      margin-bottom: 8px;
      color: var(--muted);
      font-size: 12px;
    }

      right: 16px;
      top: 86px;
      z-index: 8;
      width: min(340px, calc(100vw - 32px));
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 12px 14px;
      box-shadow: 0 14px 40px rgba(0,0,0,0.28);

    .legend-panel strong { display: block; margin-bottom: 8px; }
    .legend-grid { display: grid; gap: 8px; }
    .legend-row {

      gap: 10px;
      align-items: center;

    }

      gap: 6px;
      min-height: 20px;
    }
    .legend-node {

      height: 22px;
      border-radius: 12px;
      background: rgba(92, 200, 255, 0.14);
      border: 1px solid rgba(92, 200, 255, 0.25);

    .selection {

      right: 16px;
      bottom: 16px;

      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 12px 14px;
      box-shadow: 0 14px 40px rgba(0,0,0,0.28);

    .selection strong { display: block; margin-bottom: 6px; }

      padding: 18px;

      gap: 18px;

      top: 0;
      float: right;
      margin-left: auto;
      margin-bottom: 10px;
    }

        var shellScore = row.shell_dependence_score != null ? row.shell_dependence_score : (row.build_around_score || 0);
        addQuickChip(
          row.card,
          shellScore.toFixed(1) + '/10',
          'Support delta ' + pp(row.support_delta) + ' across ' + row.supported_games + ' supported games',
          function() {
            var node = findNodeById(row.card);
            if (node) nodeDetail(node);
          }
        );
      });
      if (!(segment.build_arounds || []).length) {
        quickHint.textContent = 'No strong build-around candidates cleared the support threshold in this archetype.';
      }
      return;
    }
    var rows = quickBoosterRows();
    if (quickRarity === 'all') {
      quickHint.textContent = 'Best win boosters overall. Commons and uncommons appear only when their lift is meaningful.';
    } else {
      quickHint.textContent = 'Significant ' + quickRarity + ' cards that materially raise wins in this archetype.';
    }
    if (!rows.length) {
      quickHint.textContent = 'No ' + (quickRarity === 'all' ? '' : quickRarity + ' ') + 'win boosters cleared the significance bar in this archetype.';
      return;
    }
    rows.forEach(function(row) {
      addQuickChip(
        row.card,
        '+' + pp(row.draft_win_lift),
        row.rarity + ' | Drafted in ' + row.draft_drafts + ' projected cluster drafts',
        function() {
          var node = findNodeById(row.card);
          if (node) nodeDetail(node);
        }
      );
    });
  }
  function renderLegend() {
    var shown = visibleNodes.length;
    var total = segment.nodes.length;
    var sizeText = mode === 'analysis'
      ? 'Node size = normalized analysis score on a 0-10 scale inside this archetype. Larger cards are more defining or more structurally important.'
      : 'Node size = normalized pick score on a 0-10 scale inside this archetype. Larger cards contribute more to projected wins when you draft this lane.';
    var edgeText = !hasGameData
      ? 'Game data has not been released, so pair arrows and triplet motifs are hidden in this draft-only view.'
      : mode === 'analysis'
        ? 'Arrow width/brightness = stronger positive pair synergy, but scaled by confidence. Arrows point from the higher-win-rate card to the lower-win-rate card. Visible edges keep only non-negative synergy and at least 85% confidence; edges around an established knot can sneak in a bit lower.'
        : 'Arrow width/brightness = the same supported pair network, scaled by confidence. Arrows point from the higher-win-rate card to the lower-win-rate card. If both cards are visible here, the same supported link stays visible here too.';
    var visibilityText = mode === 'analysis'
      ? 'Showing all supported cards in the archetype.'
      : 'Showing ' + shown + ' of ' + total + ' cards. Pick-focused view keeps cards whose supported or overall performance is at least viable inside the archetype.';
    var edgeClass = mode === 'analysis' ? 'legend-edge' : 'legend-edge pick';
    var nodeClass = mode === 'analysis' ? 'legend-node' : 'legend-node pick';
    legendBox.innerHTML =
      '<strong>View Legend</strong>' +
      '<div class="legend-grid">' +
        '<div class="legend-row"><div class="legend-samples"><span class="legend-area"></span></div><div>' + (hasGameData ? 'Shaded box = learned synergy knot. Only knots above roughly 80% confidence are shown, and darker boxes are more reliable.' : 'Shaded box = learned knot from the current network. In draft-only mode these usually stay empty until game interactions are available.') + '</div></div>' +
        '<div class="legend-row"><div class="legend-samples"><span class="' + nodeClass + ' sm"></span><span class="' + nodeClass + ' md"></span><span class="' + nodeClass + ' lg"></span></div><div>' + sizeText + '</div></div>' +
        '<div class="legend-row"><div class="legend-samples"><span class="' + edgeClass + '"></span><span class="' + edgeClass + ' strong"></span></div><div>' + edgeText + '</div></div>' +
        '<div class="legend-row"><div class="legend-samples"><span class="chip">Build-Around</span></div><div>Gold dashed rings mark flagged build-arounds. Shell dependence lives in the card spotlight and does not automatically mean true build-around status.</div></div>' +
        '<div class="legend-row"><div class="legend-samples"><span class="legend-edge none"></span></div><div>' + (hasGameData ? 'No edge = the pair failed the support floor, fell below zero synergy, or did not clear the 85% confidence bar. Around a proven knot, that confidence bar relaxes by about 10%.' : 'No edge = game data has not been released.') + '</div></div>' +
        '<div class="legend-row"><div class="legend-samples"><span class="' + nodeClass + ' md"></span></div><div>Isolated node = the card may be good alone, or there is not enough evidence for a reliable positive pair link.</div></div>' +
        '<div class="legend-row"><div class="legend-samples"></div><div>' + visibilityText + '</div></div>' +
      '</div>';
  }
  function premiumSection(title, detail) {
    return '<h2>' + title + '</h2><div class="drawer-card"><strong>Premium feature</strong><div class="muted">' + detail + '</div></div>';
  }
  function renderDrawer() {
    var html = '';
    html += '<div class="drawer-card"><strong>' + segment.title + '</strong><div class="muted">' + segment.deck_count + ' decks | ' + segment.games + ' ' + performanceRowLabel + ' | ' + pct(segment.win_rate) + ' ' + performanceLabel + '</div><div class="muted">Draft cluster WR: ' + pct(segment.draft_match_win_rate || 0) + ' | Color signature: ' + (segment.color_signature || 'C') + '</div></div>';
    html += '<h2>' + (mode === 'analysis' ? 'Analysis Signposts' : 'Priority Picks By Rarity') + '</h2>';
    if (mode === 'analysis') {
      html += '<div class="pill-row">' + ['all', 'common', 'uncommon', 'rare', 'mythic'].map(function(rarity) { var active = rarity === signpostRarity ? ' active' : ''; var label = rarity === 'all' ? 'All' : rarity.charAt(0).toUpperCase() + rarity.slice(1); return '<button type="button" class="chip chip-button' + active + '" data-signpost-rarity="' + rarity + '">' + label + '</button>'; }).join('') + '</div>';
      html += '<div class="tableish">';
      currentSignpostRows().slice(0, 10).forEach(function(row) {
        html += '<div class="row"><div><strong>' + row.card + '</strong><div class="sub">lift ' + row.lift.toFixed(2) + 'x | ' + pct(row.cluster_prevalence) + ' of decks</div></div><div>' + row.z_score.toFixed(2) + '</div></div>';
      });
      if (!currentSignpostRows().length) html += '<div class="muted">No signposts found for that rarity in this archetype.</div>';
      if (access.premiumDrawer.buildAroundDetector) {
        html += premiumSection('Build-Around Detector', 'Unlock flagged build-arounds, shell dependence, and support-dependent payoffs.');
      } else if (!hasGameData) {
        html += '</div><h2>Build-Around Detector</h2><div class="drawer-card"><div class="muted">Game data has not been released.</div></div>';
      } else {
        html += '</div><h2>Build-Around Detector</h2><div class="tableish">';
        (segment.build_arounds || []).slice(0, 8).forEach(function(row) {
          var shellScore = row.shell_dependence_score != null ? row.shell_dependence_score : (row.build_around_score || 0);
          var supportedText = enoughSupport(row.supported_games) ? pct(row.supported_win_rate) : 'Not enough data';
          var soloText = enoughSupport(row.isolated_games) ? pct(row.isolated_win_rate) : 'Not enough data';
          html += '<div class="row"><div><strong>' + row.card + '</strong><div class="sub">Supported ' + supportedText + ' vs solo drawn ' + soloText + '</div></div><div>' + shellScore.toFixed(1) + ' / 10</div></div>';
        });
        if (!(segment.build_arounds || []).length) html += '<div class="muted">No high-confidence build-arounds detected.</div>';
        html += '</div>';
      }
      if (access.premiumDrawer.bestPairSynergies) {
        html += premiumSection('Best Pair Synergies', 'Unlock the strongest within-archetype card pairs and how much they exceed baseline.');
      } else if (!hasGameData) {
        html += '<h2>Best Pair Synergies</h2><div class="drawer-card"><div class="muted">Game data has not been released.</div></div>';
      } else {
        html += '<h2>Best Pair Synergies</h2><div class="tableish">';
        segment.top_pairs.slice(0, 10).forEach(function(row) {
          html += '<div class="row"><div><strong>' + row.cards.join(' + ') + '</strong><div class="sub">WR ' + pct(row.pair_win_rate) + ' | ' + row.pair_games + ' games | conf ' + confidencePercent(row.confidence_probability || 0.0) + '</div></div><div>' + row.quality_score.toFixed(2) + '</div></div>';
        });
        html += '</div>';
      }
      if (!hasGameData) {
        html += '<h2>Anti-Synergies</h2><div class="drawer-card"><div class="muted">Game data has not been released.</div></div>';
      } else {
        html += '</div><h2>Anti-Synergies</h2><div class="tableish">';
        (segment.top_anti_pairs || []).slice(0, 8).forEach(function(row) {
          html += '<div class="row"><div><strong>' + row.cards.join(' + ') + '</strong><div class="sub">WR ' + pct(row.pair_win_rate) + ' | ' + row.pair_games + ' games | conf ' + confidencePercent(row.confidence_probability || 0.0) + '</div></div><div>' + row.synergy_delta_logit.toFixed(3) + '</div></div>';
        });
        if (!(segment.top_anti_pairs || []).length) html += '<div class="muted">No anti-synergies cleared the support threshold.</div>';
        html += '</div>';
      }
      if (access.premiumDrawer.tripletMotifs) {
        html += premiumSection('Triplet Motifs', 'Unlock higher-order motifs that show which three-card groups repeatedly outperform.');
      } else if (!hasGameData) {
        html += '<h2>Triplet Motifs</h2><div class="drawer-card"><div class="muted">Game data has not been released.</div></div>';
      } else {
        html += '<h2>Triplet Motifs</h2><div class="tableish">';
        (segment.triplets.length ? segment.triplets.slice(0, 10) : []).forEach(function(row) {
          html += '<div class="row"><div><strong>' + row.cards.join(' + ') + '</strong><div class="sub">WR ' + pct(row.win_rate) + ' | ' + row.games + ' games | conf ' + confidencePercent(row.confidence_probability || 0.0) + '</div></div><div>' + row.quality.toFixed(2) + '</div></div>';
        });
        if (!segment.triplets.length) html += '<div class="muted">No triplets cleared the support threshold for this archetype.</div>';
        html += '</div>';
      }
    } else {
      Object.keys(segment.pick_by_rarity).forEach(function(rarity) {
        var rarityRows = (segment.pick_by_rarity[rarity] || []).filter(function(row) {
          return row.draft_win_lift > 0 || row.pick_priority_score > 0;
        });
        if (!rarityRows.length) return;
        html += '<div class="rarity-title">' + rarity + '</div><div class="tableish">';
        rarityRows.forEach(function(row) {
          html += '<div class="row"><div><strong>' + row.card + '</strong><div class="sub">Draft lift ' + pp(row.draft_win_lift) + ' | Drafts ' + row.draft_drafts + '</div></div><div>' + row.pick_priority_score.toFixed(1) + ' / 10</div></div>';
        });
        html += '</div>';
      });
      if (access.premiumDrawer.bestPairSynergies) {
        html += premiumSection('Draft-Supported Pairs', 'Unlock the highest-value pairings for draft decisions inside this archetype.');
      } else {
        html += '<h2>Draft-Supported Pairs</h2><div class="tableish">';
        segment.top_pick_pairs.slice(0, 10).forEach(function(row) {
          html += '<div class="row"><div><strong>' + row.cards.join(' + ') + '</strong><div class="sub">' + row.draft_pair_events + ' draft co-picks | ' + row.pair_games + ' games</div></div><div>' + row.pick_score.toFixed(1) + ' / 10</div></div>';
        });
        html += '</div>';
      }
    }
    if (access.premiumDrawer.communities) {
      html += premiumSection('Communities', 'Unlock the learned synergy knots and their top cards.');
    } else if (!hasGameData) {
      html += '<h2>Synergy Knots</h2><div class="drawer-card"><div class="muted">Game data has not been released.</div></div>';
    } else {
      html += '<h2>Synergy Knots</h2><div class="tableish">';
      segment.communities.forEach(function(row) {
        var pairText = (row.top_pairs || []).length ? row.top_pairs.map(function(pair) { return pair.join(' + '); }).join(' | ') : 'No internal pair cleared the threshold';
        html += '<div class="row"><div><strong>Knot ' + row.community_id + '</strong><div class="sub">' + row.top_cards.join(', ') + '</div><div class="sub">' + pairText + '</div></div><div>' + row.size + '<div class="sub">' + confidencePercent(row.confidence_probability || 0.0) + '</div></div></div>';
      });
      html += '</div>';
    }
    drawer.innerHTML = html;
    Array.prototype.slice.call(drawer.querySelectorAll('[data-signpost-rarity]')).forEach(function(button) {
      button.addEventListener('click', function() {
        signpostRarity = button.getAttribute('data-signpost-rarity') || 'all';
        renderDrawer();
      });
    });
  }
  function drawNode(group, node) {
    var g = svgEl('g');
    g.setAttribute('class', 'node-hit');
    var border = communityPalette[node.community % communityPalette.length];
    var fill = node.fill || { mode: 'solid', colors: ['rgb(148, 163, 184)'] };
    var r = currentNodeRadius(node);
    if (fill.mode === 'split' && fill.colors.length === 2) {
      g.appendChild(svgEl('path', { d: polarArc(node.x, node.y, r, -90, 90), fill: fill.colors[0] }));
      g.appendChild(svgEl('path', { d: polarArc(node.x, node.y, r, 90, 270), fill: fill.colors[1] }));
      g.appendChild(svgEl('circle', { cx: node.x, cy: node.y, r: r, fill: 'none', stroke: border, 'stroke-width': 2 }));
    } else {
      g.appendChild(svgEl('circle', { cx: node.x, cy: node.y, r: r, fill: fill.colors[0], stroke: border, 'stroke-width': 2 }));
    }
    if ((node.color_identity || '') === 'B') g.lastChild.setAttribute('stroke', '#f8fafc');
    if (node.is_build_around) {
      g.appendChild(svgEl('circle', {
        cx: node.x,
        cy: node.y,
        r: r + 4,
        fill: 'none',
        stroke: 'rgba(244, 201, 93, 0.95)',
        'stroke-width': 1.8,
        'stroke-dasharray': '5 4'
      }));
    }
    g.style.cursor = 'pointer';
    bindInteractiveTarget(g, function() {
      var shellScore = node.shell_dependence_score != null ? node.shell_dependence_score : (node.build_around_score || 0);
      setSelection('<strong>' + node.id + '</strong><div class="muted">' + segment.title + '</div><div style="margin-top:8px">Analysis ' + node.analysis_score.toFixed(1) + ' / 10 | Pick ' + node.pick_priority_score.toFixed(1) + ' / 10 | Shell dependence ' + shellScore.toFixed(1) + ' / 10</div>');
      nodeDetail(node);
    });
    group.appendChild(g);
  }
  function draw() {
    prepareViewState();
    clear(svg);
    renderQuickChips();
    renderLegend();
    if (drawer.classList.contains('open')) renderDrawer();
    if (access.formatLocked) {
      closeModal();
      setSelection('<strong>Members only format</strong><div class="muted" style="margin-top:8px">This set is currently behind the paywall. The public homepage still shows the archetype list.</div>');
      return;
    }
    if (!visibleNodes.length) {
      setSelection('<strong>No cards shown</strong><div class="muted" style="margin-top:8px">The active filters removed every node in this archetype view. Turn off one of the filters to widen the graph.</div>');
      return;
    }
    viewportGroup = svgEl('g');
    var bg = svgEl('g');
    var edges = svgEl('g');
    var nodes = svgEl('g');
    var labels = svgEl('g');
    viewportGroup.appendChild(bg);
    viewportGroup.appendChild(edges);
    viewportGroup.appendChild(nodes);
    viewportGroup.appendChild(labels);
    svg.appendChild(viewportGroup);
    applyViewportTransform();
    segment.communities.forEach(function(community) {
      var members = visibleNodes.filter(function(node) { return node.community === community.community_id; });
      if (members.length < 2) return;
      var xs = members.map(function(node) { return node.x; });
      var ys = members.map(function(node) { return node.y; });
      var minX = Math.min.apply(null, xs) - 64;
      var maxX = Math.max.apply(null, xs) + 64;
      var minY = Math.min.apply(null, ys) - 64;
      var maxY = Math.max.apply(null, ys) + 64;
      var knotOpacity = (0.03 + 0.12 * communityConfidence(community)).toFixed(3);
      var knotRect = svgEl('rect', { x: minX, y: minY, width: maxX - minX, height: maxY - minY, rx: 42, fill: communityPalette[community.community_id % communityPalette.length], opacity: knotOpacity });
      knotRect.style.cursor = 'pointer';
      bindInteractiveTarget(knotRect, function() {
        communityDetail(community);
      });
      bg.appendChild(knotRect);
    });
    var nodeMap = visibleNodeMap;
    var sortedEdges = visibleEdges;
    var maxEdge = Math.max.apply(null, sortedEdges.map(function(edge) { return displayEdgeScore(edge); }).concat([0.01]));
    sortedEdges.forEach(function(edge) {
      var direction = edgeDirection(edge);
      if (!direction) return;
      var signal = Math.pow(Math.max(0.0, displayEdgeScore(edge)) / maxEdge, 0.62);
      var confidence = edgeConfidence(edge);
      var width = 1.0 + 2.4 * confidence + 4.8 * signal;
      var alpha = 0.12 + 0.76 * confidence;
      var stroke = mode === 'analysis'
        ? 'rgba(92, 200, 255, ' + alpha.toFixed(3) + ')'
        : 'rgba(244, 201, 93, ' + alpha.toFixed(3) + ')';
      var geometry = edgeGeometry(direction, width);
      var edgeGroup = svgEl('g');
      var line = svgEl('line', {
        x1: geometry.x1,
        y1: geometry.y1,
        x2: geometry.x2,
        y2: geometry.y2,
        stroke: stroke,
        'stroke-width': width.toFixed(2),
        'stroke-linecap': 'round'
      });
      var arrow = svgEl('polygon', {
        points: geometry.tipX + ',' + geometry.tipY + ' ' + geometry.leftX + ',' + geometry.leftY + ' ' + geometry.rightX + ',' + geometry.rightY,
        fill: stroke,
        stroke: 'none'
      });
      var hitLine = svgEl('line', {
        x1: geometry.x1,
        y1: geometry.y1,
        x2: geometry.tipX,
        y2: geometry.tipY,
        stroke: 'transparent',
        'stroke-width': Math.max(10, width + 8).toFixed(2),
        'stroke-linecap': 'round'
      });
      edgeGroup.setAttribute('class', 'edge-hit');
      edgeGroup.style.cursor = 'pointer';
      edgeGroup.appendChild(line);
      edgeGroup.appendChild(arrow);
      edgeGroup.appendChild(hitLine);
      bindInteractiveTarget(edgeGroup, function() {
        edgeDetail(edge);
      });
      edges.appendChild(edgeGroup);
    });
    var sortedNodes = visibleNodes.slice().sort(function(a, b) { return currentNodeRadius(b) - currentNodeRadius(a); });
    sortedNodes.forEach(function(node) {
      drawNode(nodes, node);
      if (!shouldLabel(node)) return;
      var text = svgEl('text', { x: node.x + currentNodeRadius(node) + 4, y: node.y + 4, fill: '#edf2fb', 'font-size': 13, 'pointer-events': 'none' });
      text.textContent = node.label;
      labels.appendChild(text);
    });
    syncFloatingLayout();
  }
  analysisBtn.addEventListener('click', function() {
    mode = 'analysis';
    analysisBtn.classList.add('active');
    pickBtn.classList.remove('active');
    trackEvent('view_mode_selected', { view_mode: 'analysis' });
    draw();
  });
  pickBtn.addEventListener('click', function() {
    mode = 'pick';
    pickBtn.classList.add('active');
    analysisBtn.classList.remove('active');
    trackEvent('view_mode_selected', { view_mode: 'pick' });
    draw();
  });
  buildAroundBtn.addEventListener('click', function() {
    if (access.premiumFilters.buildArounds) {
      premiumMessage('Build-around filtering');
      return;
    }
    filters.buildArounds = !filters.buildArounds;
    buildAroundBtn.classList.toggle('active', filters.buildArounds);
    draw();
  });
  topSynergyBtn.addEventListener('click', function() {
    if (access.premiumFilters.topSynergies) {
      premiumMessage('Top synergies filtering');
      return;
    }
    filters.topSynergies = !filters.topSynergies;
    topSynergyBtn.classList.toggle('active', filters.topSynergies);
    draw();
  });
  coreBtn.addEventListener('click', function() {
    if (access.premiumFilters.coreOnly) {
      premiumMessage('Core-only filtering');
      return;
    }
    filters.coreOnly = !filters.coreOnly;
    coreBtn.classList.toggle('active', filters.coreOnly);
    draw();
  });
  labelsBtn.addEventListener('click', function() {
    showLabels = !showLabels;
    labelsBtn.classList.toggle('active', showLabels);
    labelsBtn.textContent = showLabels ? 'Labels On' : 'Labels Off';
    draw();
  });
  quickAnalysisBtn.addEventListener('click', function() {
    quickMode = 'analysis';
    trackEvent('quick_mode_selected', { quick_mode: 'analysis', view_mode: mode });
    renderQuickChips();
  });
  quickBoostersBtn.addEventListener('click', function() {
    quickMode = 'boosters';
    trackEvent('quick_mode_selected', { quick_mode: 'boosters', view_mode: mode });
    renderQuickChips();
  });
  quickBuildBtn.addEventListener('click', function() {
    if (access.premiumQuickRead.buildArounds) {
      premiumMessage('Quick Read build-around detector');
      return;
    }
    quickMode = 'builds';
    trackEvent('quick_mode_selected', { quick_mode: 'builds', view_mode: mode });
    renderQuickChips();
  });
  quickRarityButtons.forEach(function(button) {
    button.addEventListener('click', function() {
      quickRarity = button.getAttribute('data-rarity') || 'all';
      renderQuickChips();
    });
  });
  zoomOutBtn.addEventListener('click', function() { zoomAt(1 / 1.18); });
  resetViewBtn.addEventListener('click', resetViewport);
  zoomInBtn.addEventListener('click', function() { zoomAt(1.18); });
  quickToggleBtn.addEventListener('click', toggleQuickRead);
  legendToggleBtn.addEventListener('click', toggleLegend);
  drawerBtn.addEventListener('click', toggleDrawer);
  drawerOverlay.addEventListener('click', closeDrawer);
  svg.addEventListener('wheel', function(evt) {
    evt.preventDefault();
    zoomAt(evt.deltaY < 0 ? 1.14 : (1 / 1.14), evt.clientX, evt.clientY);
  }, { passive: false });
  svg.addEventListener('pointerdown', function(evt) {
    if (evt.button !== undefined && evt.button !== 0) return;
    if (blocksPan(evt.target)) return;
    dragState = {
      pointerId: evt.pointerId,
      startPoint: svgPointFromClient(evt.clientX, evt.clientY),
      startTx: viewState.tx,
      startTy: viewState.ty,
      moved: false
    };
    suppressClickUntil = 0;
    if (svg.setPointerCapture) svg.setPointerCapture(evt.pointerId);
  });
  svg.addEventListener('pointermove', function(evt) {
    if (!dragState || dragState.pointerId !== evt.pointerId) return;
    var point = svgPointFromClient(evt.clientX, evt.clientY);
    var dx = point.x - dragState.startPoint.x;
    var dy = point.y - dragState.startPoint.y;
    if (!dragState.moved && (Math.abs(dx) > 4 || Math.abs(dy) > 4)) {
      dragState.moved = true;
      svg.classList.add('is-dragging');
    }
    if (!dragState.moved) return;
    viewState.tx = dragState.startTx + dx;
    viewState.ty = dragState.startTy + dy;
    applyViewportTransform();
    suppressClickUntil = Date.now() + 120;
    evt.preventDefault();
  });
  function endPan(evt) {
    if (!dragState) return;
    if (evt && dragState.pointerId !== evt.pointerId) return;
    if (evt && svg.releasePointerCapture) {
      try { svg.releasePointerCapture(evt.pointerId); } catch (err) {}
    }
    dragState = null;
    svg.classList.remove('is-dragging');
  }
  svg.addEventListener('pointerup', endPan);
  svg.addEventListener('pointercancel', endPan);
  svg.addEventListener('click', function() {
    if (shouldSuppressClick()) return;
    clearSelection();
    closeModal();
  });
  document.addEventListener('keydown', function(evt) {
    if (evt.key === 'Escape') {
      closeDrawer();
      closeModal();
      clearSelection();
    }
  });
  window.addEventListener('resize', syncFloatingLayout);
  loadAccessConfig();
  renderQuickChips();
  draw();
})();
</script>
