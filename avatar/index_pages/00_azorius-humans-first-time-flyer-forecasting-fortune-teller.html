    * { box-sizing: border-box; }
    body {

      color: var(--text);

      overflow: hidden;

    a { color: inherit; text-decoration: none; }

      cursor: pointer;

      border-color: rgba(92, 200, 255, 0.45);
    }
    .toolbar {

      justify-content: space-between;
      gap: 16px;
      align-items: flex-start;
      pointer-events: none;
    }
    .toolbar .group, .panel, .selection, .mini-nav, .legend-panel {

    }

      gap: 10px;
      align-items: center;
      flex-wrap: wrap;
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 18px;
      padding: 10px 12px;
      backdrop-filter: blur(16px);
      box-shadow: 0 14px 40px rgba(0,0,0,0.28);

    .title-wrap strong { display: block; font-size: 16px; }
    .title-wrap span { color: var(--muted); font-size: 12px; }
    .canvas-wrap {
      width: 100vw;
      height: 100vh;
      position: relative;
      overflow: hidden;
    }
    svg {
      width: 100%;
      height: 100%;
      display: block;
      touch-action: none;
      cursor: grab;
    }
    svg.is-dragging { cursor: grabbing; }
    .map-controls {
      position: fixed;
      left: 16px;
      top: 96px;
      z-index: 9;
      display: flex;
      gap: 8px;
      align-items: center;
      flex-wrap: wrap;
      max-width: min(420px, calc(100vw - 32px));
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 10px 12px;
      box-shadow: 0 14px 40px rgba(0,0,0,0.28);
      pointer-events: auto;
    }
    .map-controls .hint {
      color: var(--muted);
      font-size: 12px;
      white-space: nowrap;
    }
    .mini-nav {
      position: fixed;
      left: 16px;
      bottom: 16px;
      z-index: 8;
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 10px 12px;
      max-width: min(360px, calc(100vw - 32px));
      box-shadow: 0 14px 40px rgba(0,0,0,0.28);
    }
    .mini-nav strong { display: block; margin: 0; }
    .mini-nav-head {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      align-items: center;
      margin-bottom: 8px;
    }
    .chip-row {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      margin-bottom: 8px;
    }
    .mini-nav .chips { display: flex; gap: 6px; flex-wrap: wrap; }
    .chip {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 4px 8px;
      color: var(--muted);
      font-size: 12px;
      background: rgba(255,255,255,0.04);
    }
    .chip small {
      color: var(--muted);
      font-size: 11px;
    }
    .chip-button {
      padding: 4px 8px;
      font-size: 12px;
      background: rgba(255,255,255,0.04);
      color: var(--muted);
    }
    .chip-button.active {
      background: rgba(92, 200, 255, 0.18);
      border-color: rgba(92, 200, 255, 0.45);
      color: var(--text);
    }
    .chip-button.is-clickable { cursor: pointer; }
    .quick-note {
      min-height: 16px;
      margin-bottom: 8px;
      color: var(--muted);
      font-size: 12px;
    }
    .legend-panel {
      position: fixed;
      right: 16px;
      top: 86px;
      z-index: 8;
      width: min(340px, calc(100vw - 32px));
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 12px 14px;
      box-shadow: 0 14px 40px rgba(0,0,0,0.28);
    }
    .legend-panel strong { display: block; margin-bottom: 8px; }
    .legend-grid { display: grid; gap: 8px; }
    .legend-row {
      display: grid;
      grid-template-columns: auto minmax(0, 1fr);
      gap: 10px;
      align-items: center;
      color: var(--muted);
      font-size: 12px;
    }
    .legend-samples {
      display: flex;
      align-items: center;
      gap: 6px;
      min-height: 20px;
    }
    .legend-node {
      display: inline-block;
      border-radius: 50%;
      border: 2px solid rgba(236, 242, 251, 0.9);
      background: rgba(92, 200, 255, 0.35);
    }
    .legend-node.sm { width: 10px; height: 10px; }
    .legend-node.md { width: 16px; height: 16px; }
    .legend-node.lg { width: 24px; height: 24px; }
    .legend-node.pick { background: rgba(244, 201, 93, 0.42); }
    .legend-edge {
      display: inline-block;
      width: 40px;
      border-top: 2px solid rgba(92, 200, 255, 0.9);
      border-radius: 999px;
    }
    .legend-edge.strong { border-top-width: 6px; }
    .legend-edge.pick { border-top-color: rgba(244, 201, 93, 0.92); }
    .legend-edge.none {
      border-top-width: 0;
      height: 10px;
      border: 1px dashed rgba(157, 175, 200, 0.45);
      width: 40px;
    }
    .legend-area {
      width: 38px;
      height: 22px;
      border-radius: 12px;
      background: rgba(92, 200, 255, 0.14);
      border: 1px solid rgba(92, 200, 255, 0.25);
    }
    .selection {
      position: fixed;
      right: 16px;
      bottom: 16px;
      z-index: 8;
      width: min(420px, calc(100vw - 32px));
      max-height: 40vh;
      overflow: auto;
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 12px 14px;
      box-shadow: 0 14px 40px rgba(0,0,0,0.28);
    }
    .selection.hidden { display: none; }
    .selection strong { display: block; margin-bottom: 6px; }
    .card-modal {
      position: fixed;
      left: 50%;
      top: 86px;
      transform: translateX(-50%);
      z-index: 12;
      width: min(920px, calc(100vw - 32px));
      max-height: calc(100vh - 120px);
      overflow: auto;
      background: linear-gradient(180deg, rgba(13,20,34,0.98), rgba(10,17,31,0.98));
      border: 1px solid var(--line);
      border-radius: 24px;
      box-shadow: 0 28px 72px rgba(0,0,0,0.52);
      padding: 18px;
    }
    .card-modal.hidden { display: none; }
    .card-modal-grid {
      display: grid;
      grid-template-columns: minmax(240px, 320px) minmax(0, 1fr);
      gap: 18px;
    }
    .card-modal-close {
      position: sticky;
      top: 0;
      float: right;
      margin-left: auto;
      margin-bottom: 10px;
    }
    .card-shot {
      width: 100%;
      border-radius: 18px;
      background: rgba(255,255,255,0.04);
      border: 1px solid var(--line);
      overflow: hidden;
      min-height: 340px;

    .card-shot img {
      display: block;
      width: 100%;
      height: auto;
    }
    .card-shot .muted {
      padding: 12px;
    }

      align-items: flex-start;
      margin-bottom: 12px;

      font-size: 28px;
      line-height: 1.1;

      gap: 8px;
      margin-top: 8px;
    }
    .spotlight-grid {

      gap: 10px;
      margin-bottom: 14px;
    }

      border-radius: 14px;
      padding: 10px 12px;
    }

      text-transform: uppercase;

      margin-top: 4px;
      font-size: 18px;

      font-size: 13px;
      color: var(--muted);
      text-transform: uppercase;

      right: 0;

      padding: 10px 12px;
      margin-bottom: 10px;

    .muted { color: var(--muted); }

      inset: 0;
      z-index: 14;
      display: none;
      background: rgba(0, 0, 0, 0.25);

    .hidden { display: none !important; }
    .overlay-link.open { display: block; }

        html += '<h2>Draft-Supported Pairs</h2><div class="tableish">';
        segment.top_pick_pairs.slice(0, 10).forEach(function(row) {
          html += '<div class="row"><div><strong>' + row.cards.join(' + ') + '</strong><div class="sub">' + row.draft_pair_events + ' draft co-picks | ' + row.pair_games + ' games</div></div><div>' + row.pick_score.toFixed(1) + ' / 10</div></div>';
        });
        html += '</div>';
      }
    }
    if (access.premiumDrawer.communities) {
      html += premiumSection('Communities', 'Unlock the learned synergy knots and their top cards.');
    } else {
      html += '<h2>Communities</h2><div class="tableish">';
      segment.communities.forEach(function(row) {
        html += '<div class="row"><div><strong>Knot ' + row.community_id + '</strong><div class="sub">' + row.top_cards.join(', ') + '</div></div><div>' + row.size + '</div></div>';
      });
      html += '</div>';
    }
    drawer.innerHTML = html;
  }
  function drawNode(group, node) {
    var g = svgEl('g');
    g.setAttribute('class', 'node-hit');
    var border = communityPalette[node.community % communityPalette.length];
    var fill = node.fill || { mode: 'solid', colors: ['rgb(148, 163, 184)'] };
    var r = currentNodeRadius(node);
    if (fill.mode === 'split' && fill.colors.length === 2) {
      g.appendChild(svgEl('path', { d: polarArc(node.x, node.y, r, -90, 90), fill: fill.colors[0] }));
      g.appendChild(svgEl('path', { d: polarArc(node.x, node.y, r, 90, 270), fill: fill.colors[1] }));
      g.appendChild(svgEl('circle', { cx: node.x, cy: node.y, r: r, fill: 'none', stroke: border, 'stroke-width': 2 }));
    } else {
      g.appendChild(svgEl('circle', { cx: node.x, cy: node.y, r: r, fill: fill.colors[0], stroke: border, 'stroke-width': 2 }));
    }
    if ((node.color_identity || '') === 'B') g.lastChild.setAttribute('stroke', '#f8fafc');
    if (node.is_build_around) {
      g.appendChild(svgEl('circle', {
        cx: node.x,
        cy: node.y,
        r: r + 4,
        fill: 'none',
        stroke: 'rgba(244, 201, 93, 0.95)',
        'stroke-width': 1.8,
        'stroke-dasharray': '5 4'
      }));
    }
    g.style.cursor = 'pointer';
    g.addEventListener('click', function(evt) {
      if (shouldSuppressClick()) return;
      evt.stopPropagation();
      var shellScore = node.shell_dependence_score != null ? node.shell_dependence_score : (node.build_around_score || 0);
      setSelection('<strong>' + node.id + '</strong><div class="muted">' + segment.title + '</div><div style="margin-top:8px">Analysis ' + node.analysis_score.toFixed(1) + ' / 10 | Pick ' + node.pick_priority_score.toFixed(1) + ' / 10 | Shell dependence ' + shellScore.toFixed(1) + ' / 10</div>');
      nodeDetail(node);
    });
    group.appendChild(g);
  }
  function draw() {
    prepareViewState();
    clear(svg);
    renderQuickChips();
    renderLegend();
    if (drawer.classList.contains('open')) renderDrawer();
    if (access.formatLocked) {
      closeModal();
      setSelection('<strong>Members only format</strong><div class="muted" style="margin-top:8px">This set is currently behind the paywall. The public homepage still shows the archetype list.</div>');
      return;
    }
    if (!visibleNodes.length) {
      setSelection('<strong>No cards shown</strong><div class="muted" style="margin-top:8px">The active filters removed every node in this archetype view. Turn off one of the filters to widen the graph.</div>');
      return;
    }
    viewportGroup = svgEl('g');
    var bg = svgEl('g');
    var edges = svgEl('g');
    var nodes = svgEl('g');
    var labels = svgEl('g');
    viewportGroup.appendChild(bg);
    viewportGroup.appendChild(edges);
    viewportGroup.appendChild(nodes);
    viewportGroup.appendChild(labels);
    svg.appendChild(viewportGroup);
    applyViewportTransform();
    segment.communities.forEach(function(community) {
      var members = visibleNodes.filter(function(node) { return node.community === community.community_id; });
      if (members.length < 2) return;
      var xs = members.map(function(node) { return node.x; });
      var ys = members.map(function(node) { return node.y; });
      var minX = Math.min.apply(null, xs) - 64;
      var maxX = Math.max.apply(null, xs) + 64;
      var minY = Math.min.apply(null, ys) - 64;
      var maxY = Math.max.apply(null, ys) + 64;
      bg.appendChild(svgEl('rect', { x: minX, y: minY, width: maxX - minX, height: maxY - minY, rx: 42, fill: communityPalette[community.community_id % communityPalette.length], opacity: 0.06 }));
    });
    var nodeMap = visibleNodeMap;
    var sortedEdges = visibleEdges;
    var maxEdge = Math.max.apply(null, sortedEdges.map(function(edge) { return currentEdgeScore(edge); }).concat([0.01]));
    sortedEdges.forEach(function(edge) {
      var a = nodeMap[edge.from];
      var b = nodeMap[edge.to];
      if (!a || !b) return;
      var q = Math.pow(Math.max(0.0, currentEdgeScore(edge)) / maxEdge, 0.62);
      var width = 1.1 + 9.4 * q;
      var alpha = 0.16 + 0.76 * q;
      var stroke = mode === 'analysis'
        ? 'rgba(92, 200, 255, ' + alpha.toFixed(3) + ')'
        : 'rgba(244, 201, 93, ' + alpha.toFixed(3) + ')';
      var line = svgEl('line', { x1: a.x, y1: a.y, x2: b.x, y2: b.y, stroke: stroke, 'stroke-width': width.toFixed(2), 'stroke-linecap': 'round' });
      line.setAttribute('class', 'edge-hit');
      line.style.cursor = 'pointer';
      line.addEventListener('click', function(evt) {
        if (shouldSuppressClick()) return;
        evt.stopPropagation();
        edgeDetail(edge);
      });
      edges.appendChild(line);
    });
    var sortedNodes = visibleNodes.slice().sort(function(a, b) { return currentNodeRadius(b) - currentNodeRadius(a); });
    sortedNodes.forEach(function(node) {
      drawNode(nodes, node);
      if (!shouldLabel(node)) return;
      var text = svgEl('text', { x: node.x + currentNodeRadius(node) + 4, y: node.y + 4, fill: '#edf2fb', 'font-size': 13, 'pointer-events': 'none' });
      text.textContent = node.label;
      labels.appendChild(text);
    });
    syncFloatingLayout();
  }
  analysisBtn.addEventListener('click', function() {
    mode = 'analysis';
    analysisBtn.classList.add('active');
    pickBtn.classList.remove('active');
    draw();
  });
  pickBtn.addEventListener('click', function() {
    mode = 'pick';
    pickBtn.classList.add('active');
    analysisBtn.classList.remove('active');
    draw();
  });
  buildAroundBtn.addEventListener('click', function() {
    if (access.premiumFilters.buildArounds) {
      premiumMessage('Build-around filtering');
      return;
    }
    filters.buildArounds = !filters.buildArounds;
    buildAroundBtn.classList.toggle('active', filters.buildArounds);
    draw();
  });
  topSynergyBtn.addEventListener('click', function() {
    if (access.premiumFilters.topSynergies) {
      premiumMessage('Top synergies filtering');
      return;
    }
    filters.topSynergies = !filters.topSynergies;
    topSynergyBtn.classList.toggle('active', filters.topSynergies);
    draw();
  });
  coreBtn.addEventListener('click', function() {
    if (access.premiumFilters.coreOnly) {
      premiumMessage('Core-only filtering');
      return;
    }
    filters.coreOnly = !filters.coreOnly;
    coreBtn.classList.toggle('active', filters.coreOnly);
    draw();
  });
  labelsBtn.addEventListener('click', function() {
    showLabels = !showLabels;
    labelsBtn.classList.toggle('active', showLabels);
    labelsBtn.textContent = showLabels ? 'Labels On' : 'Labels Off';
    draw();
  });
  quickAnalysisBtn.addEventListener('click', function() {
    quickMode = 'analysis';
    renderQuickChips();
  });
  quickBoostersBtn.addEventListener('click', function() {
    quickMode = 'boosters';
    renderQuickChips();
  });
  quickBuildBtn.addEventListener('click', function() {
    if (access.premiumQuickRead.buildArounds) {
      premiumMessage('Quick Read build-around detector');
      return;
    }
    quickMode = 'builds';
    renderQuickChips();
  });
  quickRarityButtons.forEach(function(button) {
    button.addEventListener('click', function() {
      quickRarity = button.getAttribute('data-rarity') || 'all';
      renderQuickChips();
    });
  });
  zoomOutBtn.addEventListener('click', function() { zoomAt(1 / 1.18); });
  resetViewBtn.addEventListener('click', resetViewport);
  zoomInBtn.addEventListener('click', function() { zoomAt(1.18); });
  quickToggleBtn.addEventListener('click', toggleQuickRead);
  legendToggleBtn.addEventListener('click', toggleLegend);
  drawerBtn.addEventListener('click', toggleDrawer);
  drawerOverlay.addEventListener('click', closeDrawer);
  svg.addEventListener('wheel', function(evt) {
    evt.preventDefault();
    zoomAt(evt.deltaY < 0 ? 1.14 : (1 / 1.14), evt.clientX, evt.clientY);
  }, { passive: false });
  svg.addEventListener('pointerdown', function(evt) {
    if (evt.button !== undefined && evt.button !== 0) return;
    if (blocksPan(evt.target)) return;
    dragState = {
      pointerId: evt.pointerId,
      startPoint: svgPointFromClient(evt.clientX, evt.clientY),
      startTx: viewState.tx,
      startTy: viewState.ty,
      moved: false
    };
    suppressClickUntil = 0;
    if (svg.setPointerCapture) svg.setPointerCapture(evt.pointerId);
  });
  svg.addEventListener('pointermove', function(evt) {
    if (!dragState || dragState.pointerId !== evt.pointerId) return;
    var point = svgPointFromClient(evt.clientX, evt.clientY);
    var dx = point.x - dragState.startPoint.x;
    var dy = point.y - dragState.startPoint.y;
    if (!dragState.moved && (Math.abs(dx) > 4 || Math.abs(dy) > 4)) {
      dragState.moved = true;
      svg.classList.add('is-dragging');
    }
    if (!dragState.moved) return;
    viewState.tx = dragState.startTx + dx;
    viewState.ty = dragState.startTy + dy;
    applyViewportTransform();
    suppressClickUntil = Date.now() + 120;
    evt.preventDefault();
  });
  function endPan(evt) {
    if (!dragState) return;
    if (evt && dragState.pointerId !== evt.pointerId) return;
    if (evt && svg.releasePointerCapture) {
      try { svg.releasePointerCapture(evt.pointerId); } catch (err) {}
    }
    dragState = null;
    svg.classList.remove('is-dragging');
  }
  svg.addEventListener('pointerup', endPan);
  svg.addEventListener('pointercancel', endPan);
  svg.addEventListener('click', function() {
    if (shouldSuppressClick()) return;
    clearSelection();
    closeModal();
  });
  document.addEventListener('keydown', function(evt) {
    if (evt.key === 'Escape') {
      closeDrawer();
      closeModal();
      clearSelection();
    }
  });
  window.addEventListener('resize', syncFloatingLayout);
  loadAccessConfig();
  renderQuickChips();
  draw();
})();
</script>
</body>
</html>
